<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadlink App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
    <script>
      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

      // Initialize Firebase
      const app = firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <header>
        <h1>Welcome to the Roadlink App</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="auth">
            <h2>Authentication</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <button id="logoutBtn">Logout</button>
        </section>
        <section id="mapContainer">
            <h2>Map</h2>
            <div id="map"></div>
        </section>
        <section id="chatInterface">
            <h2>Chat</h2>
            <div id="chatMessages"></div>
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Roadlink App. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
